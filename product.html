<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - FoodieHub</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <a href="index.html" class="logo"><h1>🍕 FoodieHub</h1></a>
            <nav class="main-nav">
                <a href="index.html" class="nav-link">Menu</a>
                <a href="orders.html" class="nav-link">Orders</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="help.html" class="nav-link">Help</a>
            </nav>
            <span id="header-user" class="header-user"></span>
        </div>
    </header>

    <!-- Product Detail -->
    <main class="container">
        <div id="product-detail" class="product-detail">
            <!-- Filled by JS — image left, details right -->
        </div>
    </main>

    <!-- Delivery Modal -->
    <div id="delivery-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Delivery Details 📦</h2>
                <button class="close-btn" id="close-delivery">&times;</button>
            </div>
            <div class="delivery-body">
                <div id="order-mini" class="order-mini"></div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="del-name" placeholder="Recipient name">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" id="del-phone" placeholder="+91 9876543210">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="del-address" placeholder="Street, Area">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" id="del-city" placeholder="City">
                    </div>
                    <div class="form-group">
                        <label>Pincode</label>
                        <input type="text" id="del-pincode" placeholder="Pincode">
                    </div>
                </div>
                <div class="form-group">
                    <label>Delivery Note (optional)</label>
                    <input type="text" id="del-note" placeholder="e.g. Ring the bell twice">
                </div>
                <button id="pay-btn" class="pay-btn">Confirm &amp; Pay via Paytm</button>
            </div>
        </div>
    </div>

    <!-- Success overlay -->
    <div id="success-overlay" class="success-overlay">
        <div class="success-box">
            <div class="success-icon">✅</div>
            <h2>Order Placed!</h2>
            <p id="success-msg"></p>
            <a href="index.html" class="back-home-btn">Back to Menu</a>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="product.js"></script>
</body>
</html>
